<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Code Clicker: Pro Edition</title>
    <link rel="stylesheet" href="index.css">
    
    <!-- קישור תקין לספריית הקונפטי - נטען ברקע ולא מעכב את המשחק -->
    <script src="https://jsdelivr.net" defer></script>
    
    <!-- טעינת ה-JavaScript עם defer מאפשרת למשחק לעלות מיד -->
    <script src="index.js" defer></script>
</head>
<body>

    <div id="event-banner">🚀 HACKATHON ACTIVE! 3X CODE & 50% OFF!</div>

    <div id="lucky-timer-container">
        <span class="bonus-label">🌟 BONUS ACTIVE:</span>
        <span id="lucky-timer">00:00</span>
    </div>

    <h1>Code Clicker</h1>
    
    <div class="stats">
        <p>Lines of Code: <span id="count">0</span></p>
        <p>Next Hackathon in: <span id="event-timer">15:00</span></p>
        <hr>
        <p>Click Power: <span id="click-power">1</span> LOC/click</p>
        <p>Auto-Rate: <span id="auto-speed">0</span> LOC/sec</p>
    </div>
    
    <div class="main-area">
        <button id="code-button">click 🖥️</button>
    </div>

    <div class="shop">
        <h2>Developer Shop</h2>
        
        <div class="item-container">
            <button id="upgrade-keyboard">upgrade Keyboard (Cost: 10)</button>
            <button id="sell-keyboard" class="sell-btn">Sell (70% Refund)</button>
        </div>
        
        <div class="item-container">
            <button id="buy-junior">Hire Junior Dev (Cost: 50)</button>
            <button id="sell-junior" class="sell-btn">Sell (70% Refund)</button>
        </div>
    </div>

</body>
</html>
