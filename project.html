<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Code Clicker: Hackathon Edition</title>
    <link rel="stylesheet" href="project.css">
</head>
<body>

    <!-- Flash Sale Banner -->
    <div id="event-banner">🚀 HACKATHON ACTIVE! 3X CODE & 50% OFF!</div>

    <h1>Code Clicker</h1>
    
    <div class="stats">
        <p>Lines of Code: <span id="count">0</span></p>
        <p>Next Hackathon in: <span id="event-timer">15:00</span></p>
        <hr>
        <p>Click Power: <span id="click-power">1</span> LOC/click</p>
        <p>Auto-Rate: <span id="auto-speed">0</span> LOC/sec</p>
    </div>
    
    <div class="main-area">
        <button id="code-button">Execute click()</button>
    </div>

    <div class="shop">
        <h2>Developer Shop</h2>
        <button id="upgrade-keyboard">Buy Better Keyboard (Cost: 10)</button>
        <br><br>
        <button id="buy-junior">Hire Junior Dev (Cost: 50)</button>
    </div>

    <script src="project.js"></script>
</body>
</html>
